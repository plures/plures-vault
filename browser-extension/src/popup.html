<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Plures Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Lock Screen -->
    <div id="lock-screen" class="screen">
      <div class="header">
        <div class="logo">🔐</div>
        <h1>Plures Vault</h1>
        <p class="subtitle">Zero-trust password manager</p>
      </div>
      <form id="unlock-form">
        <input type="password" id="master-password" placeholder="Master password" autofocus>
        <button type="submit" class="btn-primary">Unlock</button>
      </form>
      <div id="unlock-error" class="error hidden"></div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen hidden">
      <div class="toolbar">
        <input type="search" id="search" placeholder="Search credentials...">
        <button id="btn-add" class="btn-icon" title="Add credential">+</button>
        <button id="btn-lock" class="btn-icon" title="Lock vault">🔒</button>
      </div>

      <div id="credentials-list" class="list"></div>

      <div id="empty-state" class="empty hidden">
        <p>No credentials yet</p>
        <button id="btn-add-first" class="btn-secondary">Add your first credential</button>
      </div>
    </div>

    <!-- Detail Screen -->
    <div id="detail-screen" class="screen hidden">
      <div class="toolbar">
        <button id="btn-back" class="btn-icon">←</button>
        <h2 id="detail-title">Credential</h2>
        <button id="btn-autofill" class="btn-primary btn-sm">Autofill</button>
      </div>
      <div class="detail-fields">
        <div class="field">
          <label>Username</label>
          <div class="field-value">
            <span id="detail-username"></span>
            <button class="btn-copy" data-copy="detail-username">📋</button>
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-value">
            <span id="detail-password" class="masked">••••••••</span>
            <button id="btn-toggle-pw" class="btn-copy">👁</button>
            <button class="btn-copy" data-copy="detail-password">📋</button>
          </div>
        </div>
        <div class="field" id="detail-url-group">
          <label>URL</label>
          <div class="field-value">
            <a id="detail-url" href="#" target="_blank"></a>
          </div>
        </div>
        <div class="field" id="detail-notes-group">
          <label>Notes</label>
          <p id="detail-notes"></p>
        </div>
      </div>
    </div>

    <!-- Add/Edit Screen -->
    <div id="edit-screen" class="screen hidden">
      <div class="toolbar">
        <button id="btn-edit-back" class="btn-icon">←</button>
        <h2 id="edit-title">New Credential</h2>
      </div>
      <form id="edit-form">
        <input type="text" id="edit-cred-title" placeholder="Title (e.g. GitHub)" required>
        <input type="text" id="edit-username" placeholder="Username or email">
        <div class="password-field">
          <input type="password" id="edit-password" placeholder="Password" required>
          <button type="button" id="btn-generate" class="btn-icon" title="Generate">🎲</button>
        </div>
        <input type="url" id="edit-url" placeholder="URL (optional)">
        <textarea id="edit-notes" placeholder="Notes (optional)" rows="3"></textarea>
        <button type="submit" class="btn-primary">Save</button>
      </form>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
