<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plures Vault</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Slate 900 - Premium Dark */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            cursor: default;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        /* Logo Placeholder - Will be replaced by SVG */
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            position: relative;
        }

        /* The Shield */
        .shield {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>') no-repeat center;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>') no-repeat center;
            mask-size: contain;
            -webkit-mask-size: contain;
        }

        /* Pulse Animation */
        .pulse {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.4);
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0;
            opacity: 0.9;
        }

        .status {
            margin-top: 8px;
            font-size: 12px;
            color: #94a3b8; /* Slate 400 */
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .loader-line {
            width: 120px;
            height: 2px;
            background: #1e293b;
            margin-top: 24px;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: #3b82f6;
            border-radius: 2px;
            animation: loading 1s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }

        @keyframes loading {
            0% { left: -40%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="pulse"></div>
            <div class="shield"></div>
        </div>
        <h1>Plures Vault</h1>
        <div class="status">Securing Environment...</div>
        <div class="loader-line"></div>
    </div>
</body>
</html>
