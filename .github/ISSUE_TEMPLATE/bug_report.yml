name: Bug Report
description: Report a bug or unexpected behaviour in Plures Vault
labels: ["bug", "needs-qa-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: scope
    attributes:
      label: Affected Component
      description: Which part of Plures Vault is affected?
      options:
        - CLI
        - GUI (Tauri/Svelte)
        - Crypto layer (vault-crypto)
        - Core / Database (vault-core)
        - P2P Sync (vault-sync)
        - CI/CD Pipeline
        - Other / Unknown
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (data loss or security breach)
        - High (feature broken, no workaround)
        - Medium (feature degraded, workaround exists)
        - Low (minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: On which operating system(s) does this occur?
      multiple: true
      options:
        - Linux
        - macOS
        - Windows
        - All platforms
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: Describe what happened and what you expected to happen
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide minimal steps to reproduce the issue
      placeholder: |
        1. Run `plures-vault init --name "Test"`
        2. Enter master password "..."
        3. Run `plures-vault add --name "example"`
        4. Observe error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      placeholder: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `plures-vault --version` or the commit SHA
      placeholder: "e.g. 0.1.0 or abc1234"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided steps to reproduce the bug
          required: true
        - label: For security bugs I will email security@plures.ai instead of filing a public issue
          required: true
