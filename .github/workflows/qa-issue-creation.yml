name: QA Issue Creation

on:
  workflow_run:
    workflows: ["CI", "Security Audit", "Performance Tests"]
    types: [completed]

permissions:
  issues: write
  actions: read

jobs:
  create-qa-issue:
    name: Create QA Issue from Failure
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event != 'pull_request'
    steps:
      - name: Create QA failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const workflowName = run.name;
            const runUrl = run.html_url;
            const branch = run.head_branch;
            const sha = run.head_sha.slice(0, 7);
            const triggeredBy = run.triggering_actor?.login ?? 'unknown';

            // Determine severity and labels based on which workflow failed
            let severity = 'medium';
            let labels = ['qa-automated', 'qa-failure'];
            let emoji = '🔴';

            if (workflowName === 'Security Audit') {
              severity = 'critical';
              labels = ['qa-automated', 'qa-failure', 'security', 'critical'];
              emoji = '🔒';
            } else if (workflowName === 'Performance Tests') {
              severity = 'high';
              labels = ['qa-automated', 'qa-failure', 'performance', 'regression'];
              emoji = '📉';
            } else if (workflowName === 'CI') {
              severity = 'high';
              labels = ['qa-automated', 'qa-failure', 'bug'];
              emoji = '❌';
            }

            // Check for a duplicate open issue in the last 24 h
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'qa-automated',
              since,
            });

            const duplicate = existing.data.find(
              issue => issue.title.includes(workflowName) && issue.title.includes(branch)
            );

            if (duplicate) {
              console.log(`Duplicate issue found (#${duplicate.number}), skipping creation`);
              // Add a comment with the new run URL instead
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `🔄 Same failure recurred in a new run: [${workflowName} #${run.run_number}](${runUrl}) on \`${branch}\` (${sha})`,
              });
              return;
            }

            const body = [
              `## ${emoji} QA Failure: ${workflowName}`,
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **Workflow** | [${workflowName}](${runUrl}) |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Triggered by** | @${triggeredBy} |`,
              `| **Severity** | ${severity} |`,
              '',
              '### Description',
              `The **${workflowName}** workflow failed on branch \`${branch}\`.`,
              'Please review the workflow run and address the failures before the next release.',
              '',
              '### Checklist',
              '- [ ] Review the failing workflow run (link above)',
              '- [ ] Identify root cause of failure',
              '- [ ] Implement fix',
              '- [ ] Verify fix by re-running the workflow',
              '- [ ] Close this issue once resolved',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${emoji} QA Failure: ${workflowName} on \`${branch}\` (${sha})`,
              body,
              labels,
            });

            console.log(`Created QA issue #${issue.data.number}: ${issue.data.html_url}`);
