name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (all warnings treated as errors)
        run: cargo clippy --all-targets --all-features -- -W clippy::all -D warnings

  # ─── Build & Unit Tests ───────────────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Build
        run: cargo build --all-targets

      - name: Run unit tests
        run: cargo test --lib --all

      - name: Run integration tests
        run: cargo test --test '*' --all

  # ─── Code Coverage ────────────────────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-

      - name: Collect coverage
        run: |
          cargo tarpaulin \
            --all \
            --out Xml \
            --output-dir coverage/ \
            --exclude-files 'src/main.rs' \
            --timeout 120 \
            2>&1 | tee coverage/tarpaulin.log

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Check coverage threshold
        run: |
          COVERAGE=$(grep -oP '(?<=coverage: )\d+\.\d+' coverage/tarpaulin.log | tail -1)
          echo "Coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "⚠️  Could not parse coverage value; skipping threshold check"
            exit 0
          fi
          python3 -c "
          cov = float('${COVERAGE}')
          print(f'Coverage: {cov}%')
          if cov < 80:
              print(f'❌ Coverage {cov}% is below 80% threshold')
              exit(1)
          print(f'✅ Coverage {cov}% meets threshold')
          "

  # ─── Quality Gate Summary ─────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, coverage]
    if: always()
    steps:
      - name: Evaluate quality gate
        run: |
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          COVERAGE="${{ needs.coverage.result }}"

          echo "Lint:     $LINT"
          echo "Tests:    $TEST"
          echo "Coverage: $COVERAGE"

          if [ "$LINT" != "success" ] || [ "$TEST" != "success" ]; then
            echo "❌ Quality gate FAILED — required jobs did not pass"
            exit 1
          fi

          echo "✅ Quality gate PASSED"
